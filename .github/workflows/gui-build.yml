name: GUI Build

on:
  push:
    branches: [main]
    paths:
      - "gui/**"
      - "src-tauri/**"
      - "src/field_check/sidecar.py"
      - "src/field_check/pipeline.py"
      - "scripts/build-sidecar.py"
  pull_request:
    branches: [main]
    paths:
      - "gui/**"
      - "src-tauri/**"
      - "src/field_check/sidecar.py"
      - "src/field_check/pipeline.py"
      - "scripts/build-sidecar.py"
  workflow_dispatch:

jobs:
  build-sidecar:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build sidecar binary
        run: uv run python scripts/build-sidecar.py

      - name: Upload sidecar binary
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.os }}
          path: src-tauri/binaries/scanner-*

  build-gui:
    needs: build-sidecar
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Download sidecar binary
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.os }}
          path: src-tauri/binaries/

      - name: Make sidecar executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x src-tauri/binaries/scanner-*

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
